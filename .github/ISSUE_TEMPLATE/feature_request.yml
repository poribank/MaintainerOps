name: Feature request
description: Propose a maintainer workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: workflow
    attributes:
      label: Maintainer workflow
      description: Which PR review, issue triage, release, or security workflow should improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior and any relevant GitHub/OpenSSF/OpenAI integration.
    validations:
      required: true
  - type: textarea
    id: success-criteria
    attributes:
      label: Success criteria
      description: What observable result would prove this improves maintainer work?
    validations:
      required: true
  - type: dropdown
    id: automation-risk
    attributes:
      label: Automation risk
      options:
        - Report-only
        - Approval-gated write
        - Policy opt-in write
    validations:
      required: true
  - type: dropdown
    id: data-permissions
    attributes:
      label: Data and permission impact
      description: Does this need new repository content access, raw AI content transfer, or GitHub App permissions?
      options:
        - No new data access or permissions
        - New read-only metadata access
        - New repository content access
        - New GitHub write permission
        - Unsure
    validations:
      required: true
