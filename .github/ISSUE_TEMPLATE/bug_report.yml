name: Bug report
description: Report a reproducible MaintainerOps bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Include webhook payload shape, queue mode, store mode, and relevant logs when possible.
    validations:
      required: true
  - type: dropdown
    id: deployment-mode
    attributes:
      label: Deployment mode
      description: Which runtime path showed the bug?
      options:
        - Local memory demo
        - PostgreSQL and BullMQ pilot
        - Docker Compose
        - Live GitHub App webhook
        - Other or unsure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: sanitized-evidence
    attributes:
      label: Sanitized logs or evidence
      description: Include relevant logs, metrics, or evidence export snippets with tokens, private repository data, and raw issue or PR content removed.
